name: Backup to Private Repo

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Push to backup repo
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git remote add backup https://${{ secrets.BACKUP_TOKEN }}@github.com/chrisdemetriouaudio/fuzzy-parakeet-backup.git
          git push backup main --force
